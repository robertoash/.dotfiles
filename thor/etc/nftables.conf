#!/usr/bin/nft -f
# vim:set ts=2 sw=2 et:

# IPv4/IPv6 Simple & Safe firewall ruleset.
# More examples in /usr/share/nftables/ and /usr/share/doc/nftables/examples/.

destroy table inet filter
table inet filter {
  chain input {
    type filter hook input priority filter
    policy drop

    ct state invalid drop comment "early drop of invalid connections"
    ct state {established, related} accept comment "allow tracked connections"
    iif lo accept comment "allow from loopback"
    meta l4proto { icmp, icmpv6 } accept comment "allow icmp"
    tcp dport ssh accept comment "allow sshd"
    udp dport 51820 accept comment "allow wireguard"
    pkttype host limit rate 5/second counter reject with icmpx type admin-prohibited
    counter
  }
  chain forward {
    type filter hook forward priority filter
    policy drop

    ct state {established, related} accept comment "allow tracked forward connections"
    # Docker containers: 172.16.0.0/12 covers all default Docker bridge subnets.
    # Outbound (container → internet for image pulls etc.)
    ip saddr 172.16.0.0/12 accept comment "allow docker container outbound"
    # Inbound: only LAN and WireGuard VPN clients may reach containers
    ip daddr 172.16.0.0/12 ip saddr { 10.20.10.0/24, 10.66.66.0/24 } accept comment "allow LAN and VPN to docker containers"
    # WireGuard peer traffic
    iifname "wg0" accept comment "allow forwarding from wireguard clients"
    oifname "wg0" accept comment "allow forwarding to wireguard clients"
  }
}
